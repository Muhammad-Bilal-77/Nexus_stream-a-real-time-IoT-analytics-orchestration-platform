# =============================================================
# NexusStream — Redis Configuration
# =============================================================
# Mount this file into the Redis container.
# Tuned for both Pub/Sub (message broker) and cache workloads.

# Bind only to container network — not exposed externally
bind 0.0.0.0

# Require password (read from env in docker-compose)
requirepass ${REDIS_PASSWORD}

# Persistence: AOF (Append Only File) for durability
appendonly yes
appendfsync everysec        # fsync every second — balances durability vs performance

# Memory management — prevent OOM, evict LRU cache entries first
# Keep message-broker keys (iot:*) by setting maxmemory-policy carefully
maxmemory 256mb
maxmemory-policy allkeys-lru

# Pub/Sub: no special config needed — works out of the box
# Increase hz for more frequent housekeeping under high message rates
hz 20

# Logging
loglevel notice
